{% extends "base.html" %}
{% block content %}
<h1>Scan Barcode</h1>

<div id="scan-area" style="padding: 0 16px;">
  <p id="scan-status" style="padding: 8px 0; color: #6b7280; font-size: 14px;">Starting camera...</p>
  <video id="video" autoplay playsinline muted
         style="width: 100%; border-radius: 10px; background: #000; display: none;"></video>
  <div id="quagga-container" style="display: none; width: 100%; border-radius: 10px; overflow: hidden;"></div>

  <div id="manual-upc" style="display: none; margin-top: 16px;">
    <p style="font-size: 14px; color: #6b7280; margin-bottom: 8px;">Enter UPC manually:</p>
    <div style="display: flex; gap: 8px;">
      <input type="text" id="manual-upc-input" inputmode="numeric" placeholder="e.g. 012345678905">
      <button onclick="lookupManual()" class="btn">Look Up</button>
    </div>
  </div>
</div>

<div id="scan-result" style="display: none; padding: 16px;">
  <p style="font-size: 13px; color: #6b7280; margin-bottom: 4px;">Product found:</p>
  <p id="product-name-display" style="font-size: 17px; font-weight: 600; margin-bottom: 16px;"></p>

  <form action="/forms/scan/confirm" method="post">
    <input type="hidden" name="upc" id="upc-value">
    <input type="hidden" name="product_name" id="product-name-value">

    <label style="display: block; font-size: 14px; color: #374151; margin-bottom: 6px;">
      Add to pantry as:
    </label>
    <input type="text" name="ingredient_name" id="ingredient-name"
           placeholder="Ingredient name" required autocomplete="off"
           style="margin-bottom: 12px;">

    <div style="display: flex; gap: 8px;">
      <button type="submit" class="btn" style="flex: 1;">Add to Pantry</button>
      <button type="button" onclick="restartScan()" class="btn btn-secondary">Rescan</button>
    </div>
  </form>
</div>

<script src="/static/scan.js"></script>
{% endblock %}
